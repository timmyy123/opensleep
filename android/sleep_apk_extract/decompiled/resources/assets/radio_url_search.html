<script>
    function submitForm() {
        document.getElementById("form").submit();
    };

    function loopDots(step) {
        var timeout = 250
        var dot1 = document.getElementById("dot1")
        var dot2 = document.getElementById("dot2")
        var dot3 = document.getElementById("dot3")

        switch (step) {
            case 1:
                dot1.style.visibility = "visible";
                setTimeout(() => loopDots(2), timeout);
                return;
            case 2:
                dot2.style.visibility = "visible";
                setTimeout(() => loopDots(3), timeout);
                return;
            case 3:
                dot3.style.visibility = "visible";
                setTimeout(() => loopDots(), timeout);
                return;
            default:
                dot1.style.visibility = "hidden";
                dot2.style.visibility = "hidden";
                dot3.style.visibility = "hidden";
                setTimeout(() => loopDots(1), timeout);
                return;
        }
    };

    function run() {
        loopDots();
        submitForm();
    };
</script>

<body onload="run()">

<div class="bodyWrapper">
    <div id="titleText">Looking for the radio stream URL<span id="dot1">.</span><span id="dot2">.</span><span id="dot3">.</span></div>
    <div id="subtitle">On the next page, tap <div class="icon-clipboard"></div> to copy the URL to clipboard.</div>
</div>

<form id="form" action="{{url}}" method="{{method}}" enctype="{{enctype}}">
    {{fields}}
</form>

</body>

</html>
